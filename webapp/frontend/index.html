<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Explorer les ventes immobilières</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1 id="page-title">Chargement…</h1>
      </header>

      <main class="layout-grid">
        <section id="controls" class="zone">
          <div class="controls-columns">
            <div class="controls-col">
              <div class="field field-address">
                <label for="address-input">Adresse</label>
                <input
                  id="address-input"
                  type="text"
                  placeholder="Saisir une adresse..."
                  autocomplete="off"
                />
                <ul id="address-suggestions"></ul>
              </div>
              <div class="field">
                <label for="type-local">Type de local</label>
                <select id="type-local">
                  <option value="">Tous</option>
                  <option value="Appartement">Appartement</option>
                  <option value="Maison">Maison</option>
                </select>
              </div>
              <div class="field">
                <label>Surface (m²)</label>
                <div class="range-group">
                  <input id="surf-min" type="number" min="0" placeholder="Min" />
                  <span>à</span>
                  <input id="surf-max" type="number" min="0" placeholder="Max" />
                </div>
              </div>
            </div>
            <div class="controls-col">
              <div class="field">
                <label for="rayon-km">Rayon (km)</label>
                <input id="rayon-km" type="number" min="0.5" max="20" step="0.5" value="1" />
              </div>
              <div class="field">
                <label>Période des transactions</label>
                <div class="range-group">
                  <input id="date-min" type="date" />
                  <span>à</span>
                  <input id="date-max" type="date" />
                </div>
              </div>
              <div class="field">
                <label for="limit-ventes">Nombre maximum de transactions</label>
                <input id="limit-ventes" type="number" min="50" max="250" step="50" value="50" />
              </div>
            </div>
          </div>
          <div class="search-btn-wrap">
            <button id="search-btn">Rechercher</button>
          </div>
        </section>

        <div id="map-cell" class="zone">
          <div id="map"></div>
        </div>

        <section id="results-list" class="zone">
          <h2>Ventes trouvées</h2>
          <div id="results-summary"></div>
          <div id="results-table-wrap">
            <table id="results-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Type</th>
                  <th class="col-right">Surface (m²)</th>
                  <th class="col-right">Prix</th>
                  <th>Adresse</th>
                  <th>Commune</th>
                  <th>Distance</th>
                </tr>
              </thead>
              <tbody id="results-tbody"></tbody>
            </table>
          </div>
        </section>

        <div id="results-details-cell" class="zone">
          <div id="results-details"></div>
        </div>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
